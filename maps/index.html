<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Karten – Anlagenring</title>
<style>
  :root { --accent: #00fe7d; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    background: url('../assets/title_bg.jpg') center center / cover no-repeat;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  #langSwitcher {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px; cursor: pointer;
    font-size: 15px; font-weight: 600; display: flex; align-items: center;
    gap: 6px; z-index: 50; border: 1px solid rgba(255,255,255,0.35);
    user-select: none;
  }
  #langSwitcher:hover { background: rgba(255,255,255,0.22); }
  #backLink {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px;
    text-decoration: none; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.35); z-index: 50;
  }
  #backLink:hover { background: rgba(255,255,255,0.22); }
  header { padding: 60px 6vw 20px 6vw; }
  h1 {
    color: var(--accent); font-size: clamp(28px, 4vw, 46px); font-weight: 600;
    max-width: 900px; margin: 0; line-height: 1.2; text-align: center;
  }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 6vw 40px 6vw; }
  .cards { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; max-width: 1200px; }
  .card {
    width: 300px; background: rgba(8, 25, 55, 0.55);
    border: 1px solid rgba(255,255,255,0.25); border-radius: 16px;
    overflow: hidden; cursor: pointer; text-decoration: none; color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,0.45); border-color: var(--accent); }
  .card .cover { width: 100%; height: 170px; object-fit: cover; display: block; background: #0b2d5c; }
  .card .body { padding: 16px 18px; }
  .card h2 { margin: 0; font-size: 18px; font-weight: 600; text-align: center; }
</style>
</head>
<body>

<a id="backLink" href="../index.html" data-i18n="back">&larr; Startseite</a>
<div id="langSwitcher" onclick="toggleLanguage()" title="Sprache wechseln / Switch language">
  🌐 <span id="currentLangLabel">DE</span>
</div>

<header>
  <h1 data-i18n="hub_title"></h1>
</header>

<main>
  <div class="cards">
    <a class="card" data-target="../routing/region_map.html">
      <img class="cover" src="../assets/region_cover.jpg" alt="Region preview" />
      <div class="body"><h2 data-i18n="region_title"></h2></div>
    </a>
    <a class="card" data-target="intersections/intersections_map.html">
      <img class="cover" src="../assets/intersections_cover.jpg" alt="Intersections preview" />
      <div class="body"><h2 data-i18n="intersections_title"></h2></div>
    </a>
    <a class="card" data-target="transversal_roads/transversal_roads.html">
      <img class="cover" src="../assets/transversal_cover.jpg" alt="Transversal roads preview" />
      <div class="body"><h2 data-i18n="transversal_title"></h2></div>
    </a>
    <a class="card" data-target="points_of_interest/points_of_interest.html">
      <img class="cover" src="../assets/poi_cover.jpg" alt="Points of interest preview" />
      <div class="body"><h2 data-i18n="poi_title"></h2></div>
    </a>
    <a class="card" data-target="../ABsurveys/map.html">
      <img class="cover" src="../assets/survey_cover.jpg" alt="Survey preview" />
      <div class="body"><h2 data-i18n="survey_title"></h2></div>
    </a>
    <a class="card" data-target="../routing/carfree_zones_map.html">
      <img class="cover" src="../assets/carfree_cover.jpg" alt="Car-free zones preview" />
      <div class="body"><h2 data-i18n="carfree_title"></h2></div>
    </a>
    <a class="card" data-target="cycle/cycle_map.html">
      <img class="cover" src="../assets/cycle_cover.jpg" alt="Cycle tour preview" />
      <div class="body"><h2 data-i18n="cycle_title"></h2></div>
    </a>
  </div>
</main>

<script>
const TRANSLATIONS = {
  "de": {
    "back": "&larr; Startseite",
    "hub_title": "Karten",
    "intersections_title": "Kreuzungsabstände",
    "poi_title": "Aufenthaltsqualität",
    "transversal_title": "Querende Straßen",
    "survey_title": "Wahrnehmungsumfrage",
    "region_title": "Metropolregion",
    "carfree_title": "Umweltzonen &amp; Verkehrswirkung",
    "cycle_title": "Radtour – Geschwindigkeit"
  },
  "en": {
    "back": "&larr; Home",
    "hub_title": "Maps",
    "intersections_title": "Intersection distances",
    "poi_title": "Points of interest",
    "transversal_title": "Crossing streets",
    "survey_title": "Perception survey",
    "region_title": "Metropolitan area",
    "carfree_title": "Car-free zones &amp; traffic effects",
    "cycle_title": "Bike Tour – Speed"
  }
};

let currentLang = "de";

function resolveInitialLang() {
  try {
    const params = new URLSearchParams(window.location.search);
    const fromUrl = params.get("lang");
    if (fromUrl && TRANSLATIONS[fromUrl]) return fromUrl;
  } catch (e) {}
  try {
    const fromStorage = window.localStorage.getItem("site_lang");
    if (fromStorage && TRANSLATIONS[fromStorage]) return fromStorage;
  } catch (e) {}
  return "de";
}

function applyLanguage(lang) {
  currentLang = lang;
  const dict = TRANSLATIONS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.getElementById("currentLangLabel").textContent = lang.toUpperCase();
  document.documentElement.lang = lang;
  try { window.localStorage.setItem("site_lang", lang); } catch (e) {}
  document.querySelectorAll(".card[data-target]").forEach(a => {
    a.setAttribute("href", a.getAttribute("data-target") + "?lang=" + lang);
  });
  document.getElementById("backLink").setAttribute("href", "../index.html?lang=" + lang);
}

function toggleLanguage() {
  applyLanguage(currentLang === "de" ? "en" : "de");
}

applyLanguage(resolveInitialLang());
</script>

</body>
</html>
