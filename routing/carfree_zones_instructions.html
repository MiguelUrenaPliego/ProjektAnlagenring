<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Karte erklärt – Umweltzonen & Verkehrswirkung</title>
<style>
  :root { --accent: #00fe7d; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    background: url('../assets/title_bg.jpg') center center / cover no-repeat;
    display: flex; flex-direction: column; min-height: 100vh;
    color: #fff;
  }
  #langSwitcher {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px; cursor: pointer;
    font-size: 15px; font-weight: 600; display: flex; align-items: center;
    gap: 6px; z-index: 50; border: 1px solid rgba(255,255,255,0.35);
    user-select: none;
  }
  #langSwitcher:hover { background: rgba(255,255,255,0.22); }
  #backLink {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px;
    text-decoration: none; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.35); z-index: 50;
  }
  #backLink:hover { background: rgba(255,255,255,0.22); }
  header { padding: 60px 6vw 10px 6vw; }
  h1 {
    color: var(--accent); font-size: clamp(24px, 3.6vw, 38px); font-weight: 600;
    max-width: 900px; margin: 0 auto; line-height: 1.2; text-align: center;
  }
  main {
    flex: 1; display: flex; justify-content: center;
    padding: 20px 6vw 50px 6vw;
  }
  .panel {
    max-width: 760px; width: 100%;
    background: rgba(8, 25, 55, 0.6);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    padding: 28px 34px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .panel h2 {
    color: var(--accent); font-size: 18px; margin: 22px 0 8px 0;
  }
  .panel h2:first-child { margin-top: 0; }
  .panel p { line-height: 1.55; margin: 0 0 6px 0; font-size: 15px; }
  .panel .emoji-tag {
    display: inline-block; background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
    padding: 0 5px; margin: 0 2px;
  }
  .continue-wrap { text-align: center; margin-top: 28px; }
  #continueBtn {
    display: inline-block; background: var(--accent); color: #06210f;
    font-weight: 700; text-decoration: none; padding: 12px 28px;
    border-radius: 24px; font-size: 16px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #continueBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
</style>
</head>
<body>

<a id="backLink" href="../maps/index.html" data-i18n="back">&larr; Karten</a>
<div id="langSwitcher" onclick="toggleLanguage()" title="Sprache wechseln / Switch language">
  🌐 <span id="currentLangLabel">DE</span>
</div>

<header>
  <h1 data-i18n="title"></h1>
</header>

<main>
  <div class="panel">
    <h2 data-i18n="click_polygon_title"></h2>
    <p data-i18n="click_polygon_body"></p>

    <h2 data-i18n="table_emoji_title"></h2>
    <p data-i18n="table_emoji_body"></p>

    <h2 data-i18n="route_explorer_title"></h2>
    <p data-i18n="route_explorer_body"></p>

    <h2 data-i18n="traffic_layer_title"></h2>
    <p data-i18n="traffic_layer_body"></p>

    <h2 data-i18n="scenario_title"></h2>
    <p data-i18n="scenario_body"></p>

    <div class="continue-wrap">
      <a id="continueBtn" href="carfree_zones_map.html" data-i18n="continue"></a>
    </div>
  </div>
</main>

<script>
const TRANSLATIONS = {
  "de": {
    "back": "&larr; Karten",
    "title": "So funktioniert die Karte: Umweltzonen &amp; Verkehrswirkung",
    "click_polygon_title": "Klick auf ein Gebiet (AOI-Polygon)",
    "click_polygon_body": "Öffnet ein Infofenster mit Kennzahlen zu diesem Gebiet und zeichnet automatisch die \"schlechteste Route\" (größte Zeitzunahme) von diesem Gebiet zu seinem am stärksten betroffenen Ziel ein – die aktuelle Route (ohne Sperrung) sowie, falls ein Sperrungs-Szenario ausgewählt ist, zusätzlich dessen Route zum selben Ziel, damit beide direkt vergleichbar sind.",
    "table_emoji_title": "Die <span class=\"emoji-tag\">📊</span>-Schaltfläche im Infofenster",
    "table_emoji_body": "Blendet eine detaillierte Vergleichstabelle ein/aus: eine Spalte pro Szenario, eine Zeile pro Kennzahl (Zeit, Distanz, Geschwindigkeit, betroffene Bevölkerung usw.) – so lassen sich alle Szenarien auf einen Blick vergleichen, ohne das Dropdown ständig umzuschalten.",
    "route_explorer_title": "Eigene Route auswählen (Routen-Explorer)",
    "route_explorer_body": "Über die Schaltfläche \"Route auswählen\" unten links aktivieren, dann Start-Gebiet und danach Ziel-Gebiet anklicken. Ein Panel zeigt daraufhin die Route für jedes Szenario eingezeichnet, mit einer Tabelle aus Zeit, Distanz, Geschwindigkeit und CO2 pro Szenario.",
    "traffic_layer_title": "Verkehrszunahme-Layer anzeigen",
    "traffic_layer_body": "Über die Checkbox \"Verkehrszunahme anzeigen (Straßen)\" oben rechts aktivierbar. Solange dieser Layer aktiv ist, öffnet ein Klick auf die Karte stattdessen den Rasterwert an dieser Stelle – ein Klick auf ein Gebiets-Polygon öffnet währenddessen <b>kein</b> Infofenster mehr. Häkchen entfernen, um wieder Gebiete anklicken zu können.",
    "scenario_title": "Szenario / Sperrungs-Version wechseln",
    "scenario_body": "Über das \"Szenario\"-Dropdown oben rechts zwischen Aktuell (keine Sperrung), Sperrung Zentrum, Sperrung Anlagenring und Sperrung Bahnhof wechseln – das ändert die eingefärbten Kennzahlen, die schlechteste Route und die Vergleichstabelle entsprechend.",
    "continue": "Weiter zur Karte ▸"
  },
  "en": {
    "back": "&larr; Maps",
    "title": "How the map works: Car-free Zones &amp; Traffic Effects",
    "click_polygon_title": "Clicking an area (AOI polygon)",
    "click_polygon_body": "Opens an info popup with that area's stats and automatically draws its \"worst route\" (biggest time increase) to its most-affected destination — the current (no-closure) route, plus, if a closure scenario is selected, that scenario's own route to the same destination, so the two are directly comparable.",
    "table_emoji_title": "The <span class=\"emoji-tag\">📊</span> button in the popup",
    "table_emoji_body": "Toggles a detailed comparison table: one column per scenario, one row per metric (time, distance, speed, population affected, etc.) — lets you compare every scenario at a glance instead of flipping the dropdown back and forth.",
    "route_explorer_title": "Selecting a custom route (route explorer)",
    "route_explorer_body": "Enable it via the \"Select route\" button (bottom-left), then click an origin area, then a destination area. A panel then shows that route drawn for every scenario, with a table of time, distance, speed and CO2 per scenario.",
    "traffic_layer_title": "Showing the traffic-increase layer",
    "traffic_layer_body": "Enable it via the \"Show traffic increase (roads)\" checkbox (top-right). While this layer is on, clicking the map reads the raster value at that point instead — clicking an area polygon will <b>not</b> open its info popup while this is active. Uncheck it to click areas again.",
    "scenario_title": "Switching scenario / closure version",
    "scenario_body": "Use the \"Scenario\" dropdown (top-right) to switch between Current (no closure), Center closure, Anlagenring closure and Bahnhof closure — this updates the colored metrics, the worst route, and the comparison table accordingly.",
    "continue": "Continue to the map ▸"
  }
};

let currentLang = "de";

function resolveInitialLang() {
  try {
    const params = new URLSearchParams(window.location.search);
    const fromUrl = params.get("lang");
    if (fromUrl && TRANSLATIONS[fromUrl]) return fromUrl;
  } catch (e) {}
  try {
    const fromStorage = window.localStorage.getItem("site_lang");
    if (fromStorage && TRANSLATIONS[fromStorage]) return fromStorage;
  } catch (e) {}
  return "de";
}

function applyLanguage(lang) {
  currentLang = lang;
  const dict = TRANSLATIONS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.getElementById("currentLangLabel").textContent = lang.toUpperCase();
  document.documentElement.lang = lang;
  try { window.localStorage.setItem("site_lang", lang); } catch (e) {}
  document.getElementById("continueBtn").setAttribute("href", "carfree_zones_map.html?lang=" + lang);
  document.getElementById("backLink").setAttribute("href", "../maps/index.html?lang=" + lang);
}

function toggleLanguage() {
  applyLanguage(currentLang === "de" ? "en" : "de");
}

applyLanguage(resolveInitialLang());
</script>

</body>
</html>
