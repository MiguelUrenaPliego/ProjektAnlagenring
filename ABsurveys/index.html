<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anlagenring Wahrnehmungsumfrage</title>
<style>
  :root { --accent: #00fe7d; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    background: linear-gradient(160deg, #0b2d5c 0%, #08192f 100%);
    display: flex; flex-direction: column; min-height: 100vh;
  }
  #langSwitcher {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px; cursor: pointer;
    font-size: 15px; font-weight: 600; display: flex; align-items: center;
    gap: 6px; z-index: 50; border: 1px solid rgba(255,255,255,0.35);
    user-select: none;
  }
  #langSwitcher:hover { background: rgba(255,255,255,0.22); }
  #backLink {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(4px);
    color: #fff; padding: 8px 14px; border-radius: 20px;
    text-decoration: none; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.35); z-index: 50;
  }
  #backLink:hover { background: rgba(255,255,255,0.22); }
  header { padding: 60px 6vw 20px 6vw; }
  h1 {
    color: var(--accent); font-size: clamp(28px, 4vw, 46px); font-weight: 600;
    max-width: 900px; margin: 0 auto; line-height: 1.2; text-align: center;
  }
  p.subtitle {
    color: rgba(255,255,255,0.75); max-width: 700px; margin: 16px auto 0 auto;
    text-align: center; font-size: 16px; line-height: 1.5;
  }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 6vw 40px 6vw; }
  .cards { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
  .card {
    width: 320px; background: rgba(8, 25, 55, 0.55);
    border: 1px solid rgba(255,255,255,0.25); border-radius: 16px;
    overflow: hidden; cursor: pointer; text-decoration: none; color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,0.45); border-color: var(--accent); }
  .card .icon {
    width: 100%; height: 150px; display: flex; align-items: center; justify-content: center;
    font-size: 56px; background: #0b2d5c;
  }
  .card .body { padding: 18px 20px; }
  .card h2 { margin: 0 0 6px 0; font-size: 20px; font-weight: 600; text-align: center; }
  .card p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.4; }
  .badge {
    display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 10px;
    border-radius: 10px; background: rgba(0,254,125,0.15); color: var(--accent);
  }
  .badge.demo { background: rgba(245, 158, 11, 0.18); color: #f59e0b; }
  footer {
    padding: 18px 6vw 28px 6vw; color: rgba(255,255,255,0.6); font-size: 13px;
    line-height: 1.5; text-align: center;
  }
  footer a { color: rgba(255,255,255,0.75); }
</style>
</head>
<body>

<a id="backLink" href="../index.html" data-i18n="back">&larr; Startseite</a>
<div id="langSwitcher" onclick="toggleLanguage()" title="Sprache wechseln / Switch language">
  🌐 <span id="currentLangLabel">DE</span>
</div>

<header>
  <h1 data-i18n="title"></h1>
  <p class="subtitle" data-i18n="subtitle"></p>
</header>

<main>
  <div class="cards">
    <a class="card" href="map.html">
      <div class="icon">🗺️</div>
      <div class="body">
        <h2 data-i18n="map_title"></h2>
        <p data-i18n="map_desc"></p>
        <div style="text-align:center;"><span class="badge" data-i18n="map_badge"></span></div>
      </div>
    </a>

    <a class="card" href="web.html">
      <div class="icon">🅰️🅱️</div>
      <div class="body">
        <h2 data-i18n="survey_title"></h2>
        <p data-i18n="survey_desc"></p>
        <div style="text-align:center;"><span class="badge demo" data-i18n="survey_badge"></span></div>
      </div>
    </a>

    <a class="card" href="https://cs-futurecities.media.mit.edu/" target="_blank" rel="noopener">
      <div class="icon">🌐</div>
      <div class="body">
        <h2 data-i18n="real_title"></h2>
        <p data-i18n="real_desc"></p>
        <div style="text-align:center;"><span class="badge" data-i18n="real_badge"></span></div>
      </div>
    </a>
  </div>
</main>

<footer data-i18n="footer"></footer>

<script>
const TRANSLATIONS = {
  "de": {
    "back": "&larr; Startseite",
    "title": "Anlagenring Wahrnehmungsumfrage",
    "subtitle": "Erkunden Sie die ausgewerteten Umfrageergebnisse auf der Karte oder probieren Sie das Umfrage-Mockup aus.",
    "map_title": "Ergebniskarte",
    "map_desc": "Interaktive Karte mit den ausgewerteten Wahrnehmungsdaten entlang des Anlagenrings.",
    "map_badge": "Ergebnisse",
    "survey_title": "Umfrage-Mockup",
    "survey_desc": "Klicken Sie sich durch das Umfrage-Mockup. Bilder werden zufällig aus dem Bildpool geladen.",
    "survey_badge": "Nur Mockup",
    "real_title": "Echte Umfrage",
    "real_desc": "Nehmen Sie an der echten Wahrnehmungsumfrage teil. Ihre Antworten fließen in die Auswertung ein.",
    "real_badge": "cs-futurecities.media.mit.edu",
    "footer": "Das Umfrage-Mockup auf dieser Seite dient nur zur Veranschaulichung. Es werden keine Antworten gespeichert. Die echte Umfrage finden Sie unter <a href=\"https://cs-futurecities.media.mit.edu/\" target=\"_blank\" rel=\"noopener\">cs-futurecities.media.mit.edu</a>."
  },
  "en": {
    "back": "&larr; Home",
    "title": "Anlagenring Perception Survey",
    "subtitle": "Explore the evaluated survey results on the map, or try the survey mockup.",
    "map_title": "Results map",
    "map_desc": "Interactive map showing the evaluated perception data along the Anlagenring.",
    "map_badge": "Results",
    "survey_title": "Survey mockup",
    "survey_desc": "Click through the survey mockup. Images are drawn randomly from the scenario's image pool.",
    "survey_badge": "Mockup only",
    "real_title": "Real survey",
    "real_desc": "Take part in the real perception survey. Your answers feed directly into the evaluation.",
    "real_badge": "cs-futurecities.media.mit.edu",
    "footer": "The survey mockup on this page is for illustration only. No answers are saved. The real survey is hosted at <a href=\"https://cs-futurecities.media.mit.edu/\" target=\"_blank\" rel=\"noopener\">cs-futurecities.media.mit.edu</a>."
  }
};

let currentLang = "de";

function resolveInitialLang() {
  try {
    const params = new URLSearchParams(window.location.search);
    const fromUrl = params.get("lang");
    if (fromUrl && TRANSLATIONS[fromUrl]) return fromUrl;
  } catch (e) {}
  try {
    const fromStorage = window.localStorage.getItem("site_lang");
    if (fromStorage && TRANSLATIONS[fromStorage]) return fromStorage;
  } catch (e) {}
  return "de";
}

function applyLanguage(lang) {
  currentLang = lang;
  const dict = TRANSLATIONS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.getElementById("currentLangLabel").textContent = lang.toUpperCase();
  document.documentElement.lang = lang;
  try { window.localStorage.setItem("site_lang", lang); } catch (e) {}
  document.getElementById("backLink").setAttribute("href", "../index.html?lang=" + lang);
}

function toggleLanguage() {
  applyLanguage(currentLang === "de" ? "en" : "de");
}

applyLanguage(resolveInitialLang());
</script>

</body>
</html>
